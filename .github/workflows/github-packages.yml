name: GitHub Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version. Defaults to the tag name or bin/sshfling VERSION."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      owner_lc: ${{ steps.metadata.outputs.owner_lc }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version and owner
        id: metadata
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v${version}" ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match resolved image version '${version}'." >&2
            exit 1
          fi
          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >>"$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: client
            title: client image
            context: ./ssh-client
            file: ./ssh-client/Dockerfile
            description: SSHFling client runtime image
          - image: server
            title: server image
            context: ./ssh-server
            file: ./ssh-server/Dockerfile
            description: SSHFling timed SSH server runtime image
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.resolve.outputs.owner_lc }}/sshfling-${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=SSHFling ${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ needs.resolve.outputs.version }},enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          pull: true
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=sshfling-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=sshfling-${{ matrix.image }}

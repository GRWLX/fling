name: Release packages without web

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version. Defaults to the tag name or bin/sshfling VERSION."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev file rpm

      - name: Validate sources
        run: make test

      - name: Build Debian and RPM packages
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./packaging/build-deb.sh
          ./packaging/build-rpm.sh
          git archive \
            --format=tar.gz \
            --prefix="sshfling-${SSHFLING_VERSION}/" \
            --output="dist/sshfling-${SSHFLING_VERSION}.tar.gz" \
            HEAD

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS package
    runs-on: macos-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Build macOS package
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: ./packaging/build-pkg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-package
          path: dist/*.pkg
          if-no-files-found: error

  windows:
    name: Windows package
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          version="$(bash packaging/resolve-version.sh "$INPUT_VERSION")"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: Build Windows MSI
        shell: pwsh
        env:
          SSHFLING_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -File packaging/build-msi.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: |
            dist/*.msi
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    needs:
      - linux
      - macos
      - windows
    steps:
      - uses: actions/checkout@v7

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Validate release versions and artifact set
        env:
          LINUX_VERSION: ${{ needs.linux.outputs.version }}
          MACOS_VERSION: ${{ needs.macos.outputs.version }}
          WINDOWS_VERSION: ${{ needs.windows.outputs.version }}
        run: |
          set -euo pipefail
          version="$LINUX_VERSION"
          if [[ -z "$version" || "$version" != "$MACOS_VERSION" || "$version" != "$WINDOWS_VERSION" ]]; then
            echo "Package jobs resolved different versions: linux='$LINUX_VERSION' macos='$MACOS_VERSION' windows='$WINDOWS_VERSION'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' does not match resolved package version '${version}'." >&2
            exit 1
          fi
          cd release-dist
          required_files=(
            "sshfling_${version}_all.deb"
            "sshfling-${version}-1.noarch.rpm"
            "sshfling-${version}.tar.gz"
            "sshfling-${version}.pkg"
            "sshfling-${version}.msi"
            "sshfling-${version}-windows.zip"
          )
          printf '%s\n' "${required_files[@]}" | sort >"$RUNNER_TEMP/release-required-files.txt"
          find . -maxdepth 1 -type f -printf '%P\n' | sort >"$RUNNER_TEMP/release-actual-files.txt"
          if ! diff -u "$RUNNER_TEMP/release-required-files.txt" "$RUNNER_TEMP/release-actual-files.txt"; then
            echo "Release artifact set must exactly match the expected package files." >&2
            exit 1
          fi
          nested_file="$(find . -mindepth 2 -type f -print -quit)"
          if [[ -n "$nested_file" ]]; then
            echo "Release artifacts must be flattened before publication; found nested file: $nested_file" >&2
            exit 1
          fi
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Release artifact is missing or empty: $file" >&2
              exit 1
            fi
          done

      - name: Create checksums and release evidence
        env:
          VERSION: ${{ needs.linux.outputs.version }}
        run: |
          set -euo pipefail
          cd release-dist
          required_files=(
            "sshfling_${VERSION}_all.deb"
            "sshfling-${VERSION}-1.noarch.rpm"
            "sshfling-${VERSION}.tar.gz"
            "sshfling-${VERSION}.pkg"
            "sshfling-${VERSION}.msi"
            "sshfling-${VERSION}-windows.zip"
          )
          checksums="$RUNNER_TEMP/release-SHA256SUMS"
          : >"$checksums"
          for file in "${required_files[@]}"; do
            sha256sum -- "$file" >>"$checksums"
          done
          mv "$checksums" SHA256SUMS
          sha256sum -c SHA256SUMS
          evidence="$RUNNER_TEMP/release-evidence.md"
          {
            echo "# SSHFling release package evidence"
            echo
            echo "Version: ${VERSION}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Expected release artifacts: ${#required_files[@]}"
            echo
            echo "| File | Bytes | SHA-256 |"
            echo "| --- | ---: | --- |"
            for file in "${required_files[@]}"; do
              name="$file"
              bytes="$(wc -c <"$file" | tr -d '[:space:]')"
              hash="$(sha256sum "$file" | awk '{print $1}')"
              printf "| \`%s\` | %s | \`%s\` |\n" "$name" "$bytes" "$hash"
            done
          } > "$evidence"
          mv "$evidence" RELEASE-EVIDENCE.md
          cat RELEASE-EVIDENCE.md >>"$GITHUB_STEP_SUMMARY"
          cd ..
          {
            for file in "${required_files[@]}" SHA256SUMS RELEASE-EVIDENCE.md; do
              printf 'release-dist/%s\0' "$file"
            done
          } | xargs -0 sha256sum -- >"$RUNNER_TEMP/release-subjects.sha256"

      - name: Generate and validate release evidence gate
        run: |
          set -euo pipefail
          python3 tools/generate_release_evidence.py \
            --mode release-assets \
            --artifacts-dir release-dist \
            --version "${{ needs.linux.outputs.version }}" \
            --source-commit "$GITHUB_SHA"
          make release-matrix-validate \
            RELEASE_MATRIX=docs/release/enterprise-release-evidence/generated/release-assets-matrix.csv \
            RELEASE_MANIFEST=docs/release/enterprise-release-evidence/generated/release-assets-manifest.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence
          path: |
            docs/release/enterprise-release-evidence/generated/release-assets-evidence.json
            docs/release/enterprise-release-evidence/generated/release-assets-manifest.json
            docs/release/enterprise-release-evidence/generated/release-assets-matrix.csv
          if-no-files-found: error

      - name: Attest release package provenance
        uses: actions/attest@v4
        with:
          subject-checksums: ${{ runner.temp }}/release-subjects.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-dist/*
          generate_release_notes: true
